<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tela de Cadastro - Integração Conectando Empresas e Instituições</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div class="left color-branco">
            <div class="logo-section">
                <a href="animation.html">
                    <img src="./img/logomarca-azul.png" alt="Logo Integração" class="logo">
                </a>
            </div>
        </div>
        <div class="right color-linear">
            <div class="login_form">
                <div class="icon_palmas">
                    <img src="./img/icon-palmas.png" alt="">

                <p>Clique no botão para Iniciar um Novo Cadastro. 
                    Ou então Faça Login se já tem um cadastro.
                </p>
                <div class="card_btn">
                    <a href="modulos.html"><button type="submit">Iniciar Cadastro</button></a>
                    <a href="login.html"><button type="submit">Fazer Login</button></a>
                </div>
            </div>
        </div>
    </div>
