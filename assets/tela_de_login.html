<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tela de Login - Integração Conectando Empresas e Instituições</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./img/logo-favicon.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo-section">
                <img src="./img/logomarca-horizontal.png" alt="Logo Integração" class="logo">
            </div>
        </div>
        <div class="right">
            <div class="login-form">
                <div class="icon_palmas">
                    <img src="img/icon-palmas.png" alt="">
                </div>
                <h2>Olá, é um prazer te ver por aqui!</h2>
                <p>Insira suas credenciais</p>
                <form>
                    <input id="form_email" type="email" placeholder="unifacol@contato.exemplo" required>
                    <input id="form_senha" type="password" placeholder="********" required>
                    <button type="submit">Entrar</button>
                </form>
                <a href="#">Esqueceu a senha? <span>Clique aqui</span></a>
            </div>
        </div>
    </div>
</body>
</html>
