<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tela de Login - Integração Conectando Empresas e Instituições</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div class="left color-linear">
            <div class="logo-section">
                <a href="cadastro.html">
                    <img src="./img/logomarca-horizontal.png" alt="Logo Integração" class="logo">
                </a>
            </div>
        </div>
        <div class="right">
            <div class="login_form">
                <div class="icon_palmas">
                    <img src="img/icon-palmas.png" alt="">
                </div>
                <h2 class="titulo_login">Olá, é um prazer te ver por aqui!</h2>
                <p><strong>Insira suas credenciais</strong></p>
                <form>
                    <input id="form_email" type="email" placeholder="Digite o seu melhor e-mail" required>
                    <input id="form_senha" type="password" placeholder="********" required>
                    <button type="submit">Entrar</button>
                </form>
                <a href="#">Esqueceu a senha? <span>Clique aqui</span></a>
            </div>
        </div>
    </div>
</body>
</html>
